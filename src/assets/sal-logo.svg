<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Background circle with blue gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" />
  
  <!-- Inner circle (white) -->
  <circle cx="100" cy="100" r="85" fill="white" />
  
  <!-- SAL Text -->
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1e40af" text-anchor="middle">
    SAL
  </text>
  
  <!-- Education text -->
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="16" fill="#16a34a" text-anchor="middle">
    EDUCATION
  </text>
  
  <!-- Decorative lines -->
  <line x1="50" y1="130" x2="150" y2="130" stroke="#1e40af" stroke-width="2" />
  
  <!-- Motto/Tagline -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">
    Excellence in Learning
  </text>
</svg>